<app-navbar></app-navbar>

<div class="visitors-page">

  <div class="page-header">
    <div>
      <h1>SPOC Management</h1>
      <p>Assign and manage SPOCs across platforms</p>
    </div>

    <button class="add-btn" (click)="openAddModal()">
      + Assign SPOC
    </button>
  </div>

  <div class="toolbar">
    <input
      class="search-box"
      type="text"
      placeholder="Search by SPOC name, designation or platform"
      [(ngModel)]="searchText"
    />
  </div>

  <table *ngIf="filteredVisitors.length > 0">
    <thead>
      <tr>
        <th>S.No</th>
        <th>SPOC Designation</th>
        <th>SPOC Name</th>
        <th>DOB</th>
        <th>Platform</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let visitor of filteredVisitors; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ visitor.spoc_designation }}</td>
        <td>{{ visitor.visitor_name }}</td>
        <td>{{ visitor.spoc_dob }}</td>
        <td>{{ visitor.platform }}</td>

        <td>
          <span class="status-badge">
            {{ visitor.status }}
          </span>
        </td>

        <td>
          <button
            class="checkin-btn"
            (click)="updateStatus(i)"
            *ngIf="visitor.status !== 'Verified'">

            {{ visitor.status === 'Inactive' ? 'Activate' : 'Verify' }}

          </button>

          <button class="delete-btn" (click)="deleteVisitor(i)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <p class="empty-state" *ngIf="filteredVisitors.length === 0">
    No SPOC records found.
  </p>

</div>

<div class="modal-backdrop" *ngIf="showAddModal">
  <div class="modal">
    <h2>Assign SPOC</h2>

    <form [formGroup]="visitorForm">

      <input
        type="text"
        placeholder="SPOC Designation"
        formControlName="spocDesignation"
      />

      <input
        type="text"
        placeholder="SPOC Name"
        formControlName="spocName"
      />

      <input
        type="date"
        formControlName="spocDob"
      />

      <select formControlName="platform">
        <option value="">Select Platform</option>
        <option value="Swiggy">Swiggy</option>
        <option value="Zomato">Zomato</option>
        <option value="Blinkit">Blinkit</option>
        <option value="Zepto">Zepto</option>
        <option value="Other">Other</option>
      </select>

    </form>

    <div class="buttons">
      <button (click)="addVisitor()">Save</button>
      <button (click)="closeAddModal()">Cancel</button>
    </div>
  </div>
</div>
