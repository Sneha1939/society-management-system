<div class="login-page">

  <div class="login-card">

    <div class="logo-section">
      <mat-icon class="logo-icon">admin_panel_settings</mat-icon>
      <h1>Admin Login</h1>
    <p class="subtitle">Login to access the admin dashboard</p>

    <form [formGroup]="loginForm">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter email"
        />

        <p class="error" *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
          Email is required
        </p>

        <p class="error" *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
          Please enter a valid email
        </p>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter password"
        />

        <p class="error" *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
          Password is required
        </p>
        <p class="forgot-password">Forgot Password?</p>
      </div>

    </form>

    <p class="login-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <div class="button-group">
      <button class="login-btn" (click)="login()">Login</button>
      <button class="reset-btn" (click)="reset()">Reset</button>
    </div>

  </div>

</div>
